services:
  backend:
    image: ${AE_IMAGE_REPOSITORY}:${AE_IMAGE_TAG}
    env_file:
      - .env
    ports:
      - "${AE_SERVER_PORT}:8081"
    volumes:
      - appstate:/var/lib/ai-efficiency
    depends_on:
      updater:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/auth/me"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  updater:
    image: ${AE_IMAGE_REPOSITORY}:${AE_IMAGE_TAG}
    command: ["./updater"]
    env_file:
      - .env
    environment:
      AE_UPDATER_COMPOSE_FILE: /work/deploy/docker-compose.external.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/work/deploy
      - appstate:/var/lib/ai-efficiency

volumes:
  appstate:
