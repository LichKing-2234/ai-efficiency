services:
  postgres:
    image: postgres:16-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${AE_IMAGE_REPOSITORY}:${AE_IMAGE_TAG}
    environment:
      AE_SERVER_PORT: "${AE_SERVER_PORT}"
      AE_SERVER_MODE: "${AE_SERVER_MODE}"
      AE_SERVER_FRONTEND_URL: "${AE_SERVER_FRONTEND_URL}"
      AE_DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      AE_REDIS_ADDR: "redis:6379"
      AE_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      AE_REDIS_DB: "0"
      AE_RELAY_URL: "${AE_RELAY_URL}"
      AE_RELAY_API_KEY: "${AE_RELAY_API_KEY}"
      AE_RELAY_ADMIN_API_KEY: "${AE_RELAY_ADMIN_API_KEY}"
      AE_AUTH_JWT_SECRET: "${AE_AUTH_JWT_SECRET}"
      AE_ENCRYPTION_KEY: "${AE_ENCRYPTION_KEY}"
      AE_DEPLOYMENT_MODE: "${AE_DEPLOYMENT_MODE}"
      AE_DEPLOYMENT_STATE_DIR: "${AE_DEPLOYMENT_STATE_DIR}"
      AE_DEPLOYMENT_UPDATE_ENABLED: "${AE_DEPLOYMENT_UPDATE_ENABLED}"
      AE_DEPLOYMENT_UPDATE_APPLY_ENABLED: "${AE_DEPLOYMENT_UPDATE_APPLY_ENABLED}"
      AE_DEPLOYMENT_UPDATE_RELEASE_API_URL: "${AE_DEPLOYMENT_UPDATE_RELEASE_API_URL}"
      AE_DEPLOYMENT_UPDATE_UPDATER_URL: "${AE_DEPLOYMENT_UPDATE_UPDATER_URL}"
      AE_DEPLOYMENT_UPDATE_IMAGE_REPOSITORY: "${AE_IMAGE_REPOSITORY}"
    ports:
      - "${AE_SERVER_PORT}:8081"
    volumes:
      - appstate:/var/lib/ai-efficiency
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      updater:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/auth/me"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  updater:
    image: ${AE_UPDATER_IMAGE_REPOSITORY}:${AE_UPDATER_IMAGE_TAG}
    command: ["./updater"]
    environment:
      COMPOSE_PROJECT_NAME: "${COMPOSE_PROJECT_NAME}"
      AE_SERVER_MODE: "${AE_SERVER_MODE}"
      AE_DEPLOYMENT_STATE_DIR: "${AE_DEPLOYMENT_STATE_DIR}"
      AE_UPDATER_ENV_FILE: "${AE_UPDATER_ENV_FILE}"
      AE_UPDATER_SERVICE_NAME: "${AE_UPDATER_SERVICE_NAME}"
      AE_UPDATER_PROJECT_NAME: "${AE_UPDATER_PROJECT_NAME}"
      AE_UPDATER_COMPOSE_FILE: /work/deploy/docker-compose.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/work/deploy
      - appstate:/var/lib/ai-efficiency

volumes:
  pgdata:
  redisdata:
  appstate:
