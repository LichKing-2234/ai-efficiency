# Production bundled Docker Compose stack.
# Runs backend with local postgres/redis and a launcher-managed runtime binary.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: "${AE_IMAGE_REPOSITORY:-ghcr.io/lichking-2234/ai-efficiency}:${AE_IMAGE_TAG:-latest}"
    environment:
      AE_SERVER_PORT: "${AE_SERVER_PORT:-8081}"
      AE_SERVER_MODE: "${AE_SERVER_MODE:-release}"
      AE_SERVER_FRONTEND_URL: "${AE_SERVER_FRONTEND_URL:-http://localhost:8081}"
      AE_DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      AE_REDIS_ADDR: "redis:6379"
      AE_REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      AE_REDIS_DB: "0"
      AE_RELAY_URL: "${AE_RELAY_URL}"
      AE_RELAY_API_KEY: "${AE_RELAY_API_KEY:-}"
      AE_RELAY_ADMIN_API_KEY: "${AE_RELAY_ADMIN_API_KEY:-}"
      AE_AUTH_JWT_SECRET: "${AE_AUTH_JWT_SECRET}"
      AE_AUTH_LDAP_URL: "${AE_AUTH_LDAP_URL:-}"
      AE_AUTH_LDAP_BASE_DN: "${AE_AUTH_LDAP_BASE_DN:-}"
      AE_AUTH_LDAP_BIND_DN: "${AE_AUTH_LDAP_BIND_DN:-}"
      AE_AUTH_LDAP_BIND_PASSWORD: "${AE_AUTH_LDAP_BIND_PASSWORD:-}"
      AE_AUTH_LDAP_USER_FILTER: "${AE_AUTH_LDAP_USER_FILTER:-(uid=%s)}"
      AE_AUTH_LDAP_TLS: "${AE_AUTH_LDAP_TLS:-false}"
      AE_ENCRYPTION_KEY: "${AE_ENCRYPTION_KEY}"
      AE_DEPLOYMENT_MODE: "${AE_DEPLOYMENT_MODE:-bundled}"
      AE_DEPLOYMENT_STATE_DIR: "${AE_DEPLOYMENT_STATE_DIR:-/var/lib/ai-efficiency}"
      AE_DEPLOYMENT_UPDATE_ENABLED: "${AE_DEPLOYMENT_UPDATE_ENABLED:-true}"
      AE_DEPLOYMENT_UPDATE_APPLY_ENABLED: "${AE_DEPLOYMENT_UPDATE_APPLY_ENABLED:-true}"
      AE_DEPLOYMENT_UPDATE_RELEASE_API_URL: "${AE_DEPLOYMENT_UPDATE_RELEASE_API_URL:-https://api.github.com/repos/LichKing-2234/ai-efficiency/releases/latest}"
      AE_DEPLOYMENT_UPDATE_IMAGE_REPOSITORY: "${AE_IMAGE_REPOSITORY:-ghcr.io/lichking-2234/ai-efficiency}"
    ports:
      - "${AE_SERVER_PORT:-8081}:8081"
    volumes:
      - appstate:/var/lib/ai-efficiency
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/auth/me"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  appstate:
