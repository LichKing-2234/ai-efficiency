name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.2.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      major: ${{ steps.meta.outputs.major }}
      minor: ${{ steps.meta.outputs.minor }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      owner_lower: ${{ steps.owner.outputs.owner_lower }}
      build_time: ${{ steps.meta.outputs.build_time }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$'

          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          if [ "${{ github.event_name }}" = "push" ]; then
            CHECKOUT_REF="refs/tags/$TAG"
            COMMIT_SHA="$(git rev-list -n 1 "refs/tags/$TAG")"
          else
            if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              CHECKOUT_REF="refs/tags/$TAG"
              COMMIT_SHA="$(git rev-list -n 1 "refs/tags/$TAG")"
            else
              CHECKOUT_REF="${GITHUB_SHA}"
              COMMIT_SHA="${GITHUB_SHA}"
            fi
          fi
          if echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            IS_PRERELEASE=false
          else
            IS_PRERELEASE=true
          fi
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - id: owner
        run: echo "owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  verify:
    needs: prepare
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AE_TEST_POSTGRES_DSN: postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: |
            backend/go.sum
            ae-cli/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Test backend
        working-directory: backend
        run: go test ./...
      - name: Test ae-cli
        working-directory: ae-cli
        run: go test ./...
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Test frontend
        working-directory: frontend
        run: npm test
      - name: Validate release frontend embedding
        run: bash deploy/test/release-frontend-embed-test.sh
      - name: Validate deploy shell script
        run: bash -n deploy/docker-deploy.sh
      - name: Validate compose configs
        run: |
          validate_compose() {
            local compose_file="$1"
            if docker compose --env-file deploy/.env.example -f "$compose_file" config >/dev/null 2>&1; then
              echo "validated with docker compose: $compose_file"
              return 0
            fi
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose --env-file deploy/.env.example -f "$compose_file" config >/dev/null
              echo "validated with docker-compose: $compose_file"
              return 0
            fi
            echo "no compatible compose implementation available" >&2
            exit 1
          }

          validate_compose deploy/docker-compose.yml
          validate_compose deploy/docker-compose.external.yml
      - name: Test docker bootstrap script
        run: bash deploy/test/docker-deploy-bootstrap-test.sh

  release:
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - name: Ensure release tag exists and checkout tag
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "refs/tags/$TAG:refs/tags/$TAG"
          fi

          git fetch --tags --force origin
          git checkout "refs/tags/$TAG"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: |
            backend/go.sum
            ae-cli/go.sum
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Stage frontend bundle for backend release assets
        run: bash deploy/prepare-release-frontend.sh

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image_tags
        run: |
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/${{ needs.prepare.outputs.owner_lower }}/ai-efficiency:${{ needs.prepare.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "ghcr.io/${{ needs.prepare.outputs.owner_lower }}/ai-efficiency:${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"
          if [ "${{ needs.prepare.outputs.is_prerelease }}" = "false" ]; then
            echo "ghcr.io/${{ needs.prepare.outputs.owner_lower }}/ai-efficiency:${{ needs.prepare.outputs.major }}.${{ needs.prepare.outputs.minor }}" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ needs.prepare.outputs.owner_lower }}/ai-efficiency:${{ needs.prepare.outputs.major }}" >> "$GITHUB_OUTPUT"
            echo "ghcr.io/${{ needs.prepare.outputs.owner_lower }}/ai-efficiency:latest" >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image_tags.outputs.tags }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.tag }}
            APP_COMMIT=${{ needs.prepare.outputs.commit_sha }}
            APP_BUILD_TIME=${{ needs.prepare.outputs.build_time }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
