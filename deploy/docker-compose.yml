services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${AE_IMAGE_REPOSITORY}:${AE_IMAGE_TAG}
    environment:
      AE_SERVER_PORT: "${AE_SERVER_PORT}"
      AE_SERVER_MODE: "${AE_SERVER_MODE}"
      AE_SERVER_FRONTEND_URL: "${AE_SERVER_FRONTEND_URL}"
      AE_DB_DSN: "${AE_DB_DSN}"
      AE_REDIS_ADDR: "${AE_REDIS_ADDR}"
      AE_REDIS_PASSWORD: "${AE_REDIS_PASSWORD}"
      AE_REDIS_DB: "${AE_REDIS_DB}"
      AE_RELAY_URL: "${AE_RELAY_URL}"
      AE_RELAY_API_KEY: "${AE_RELAY_API_KEY}"
      AE_RELAY_ADMIN_API_KEY: "${AE_RELAY_ADMIN_API_KEY}"
      AE_AUTH_JWT_SECRET: "${AE_AUTH_JWT_SECRET}"
      AE_ENCRYPTION_KEY: "${AE_ENCRYPTION_KEY}"
      AE_DEPLOYMENT_MODE: "${AE_DEPLOYMENT_MODE}"
      AE_DEPLOYMENT_STATE_DIR: "${AE_DEPLOYMENT_STATE_DIR}"
      AE_DEPLOYMENT_UPDATE_ENABLED: "${AE_DEPLOYMENT_UPDATE_ENABLED}"
      AE_DEPLOYMENT_UPDATE_APPLY_ENABLED: "${AE_DEPLOYMENT_UPDATE_APPLY_ENABLED}"
      AE_DEPLOYMENT_UPDATE_RELEASE_API_URL: "${AE_DEPLOYMENT_UPDATE_RELEASE_API_URL}"
      AE_DEPLOYMENT_UPDATE_UPDATER_URL: "${AE_DEPLOYMENT_UPDATE_UPDATER_URL}"
      AE_DEPLOYMENT_UPDATE_IMAGE_REPOSITORY: "${AE_IMAGE_REPOSITORY}"
    ports:
      - "${AE_SERVER_PORT}:8081"
    volumes:
      - appstate:/var/lib/ai-efficiency
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      updater:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/auth/me"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  updater:
    image: ${AE_IMAGE_REPOSITORY}:${AE_IMAGE_TAG}
    command: ["./updater"]
    environment:
      AE_SERVER_MODE: "${AE_SERVER_MODE}"
      AE_DEPLOYMENT_STATE_DIR: "${AE_DEPLOYMENT_STATE_DIR}"
      AE_UPDATER_ENV_FILE: "${AE_UPDATER_ENV_FILE}"
      AE_UPDATER_SERVICE_NAME: "${AE_UPDATER_SERVICE_NAME}"
      AE_UPDATER_COMPOSE_FILE: /work/deploy/docker-compose.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/work/deploy
      - appstate:/var/lib/ai-efficiency

volumes:
  pgdata:
  redisdata:
  appstate:
