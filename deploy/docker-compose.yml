services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file:
      - .env
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ${AE_IMAGE_REPOSITORY}:${AE_IMAGE_TAG}
    env_file:
      - .env
    ports:
      - "${AE_SERVER_PORT}:8081"
    volumes:
      - appstate:/var/lib/ai-efficiency
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      updater:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/v1/auth/me"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  updater:
    image: ${AE_IMAGE_REPOSITORY}:${AE_IMAGE_TAG}
    command: ["./updater"]
    env_file:
      - .env
    environment:
      AE_UPDATER_COMPOSE_FILE: /work/deploy/docker-compose.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/work/deploy
      - appstate:/var/lib/ai-efficiency

volumes:
  pgdata:
  redisdata:
  appstate:
